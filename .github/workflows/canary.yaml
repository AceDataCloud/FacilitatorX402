name: facilitator2 canary image

on:
  push:
    branches:
      - feat/facilitator2-canary
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: facilitator2-canary-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_ENGINE: django.db.backends.sqlite3
      PGSQL_DATABASE_FACILITATOR: ":memory:"
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - run: pip install poetry==1.8.5
      - run: pip install ruff
      - run: poetry install
      - run: ruff check .
      - run: ruff format --check .
      - run: poetry run pytest -q

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.canary
          platforms: linux/amd64
          push: true
          tags: ghcr.io/acedatacloud/facilitator-backend:canary-${{ github.sha }}
          cache-from: type=gha,scope=facilitator2
          cache-to: type=gha,mode=max,scope=facilitator2

  deploy-sv:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: Azure/k8s-set-context@v5
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_SV }}
      - name: Verify Silicon Valley cluster
        run: |
          test "$(kubectl config current-context)" != ""
          kubectl get deployment/facilitator-backend -n acedatacloud
          test "$(kubectl get ingress facilitator-backend -n acedatacloud -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')" = "lb-i4ochurg-tf6jrslgeuiykqca.clb.usw-tencentclb.cloud"
      - name: Deploy facilitator2
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: bash deploy/canary/run.sh