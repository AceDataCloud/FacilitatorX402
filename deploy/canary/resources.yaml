apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: facilitator2-data
  namespace: acedatacloud
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: cbs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: facilitator2-backend
  namespace: acedatacloud
  labels:
    app: facilitator2-backend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: facilitator2-backend
  template:
    metadata:
      labels:
        app: facilitator2-backend
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: docker-registry
      initContainers:
        - name: migrate
          image: ghcr.io/acedatacloud/facilitator-backend:${TAG}
          imagePullPolicy: Always
          command:
            - python
            - manage.py
            - migrate
            - --noinput
          env:
            - name: APP_ENV
              value: production
            - name: DEBUG
              value: "false"
            - name: APP_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app
                  key: SECRET_KEY
            - name: DATABASE_ENGINE
              value: django.db.backends.sqlite3
            - name: PGSQL_DATABASE_FACILITATOR
              value: /data/facilitator2.sqlite3
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      containers:
        - name: facilitator2-backend
          image: ghcr.io/acedatacloud/facilitator-backend:${TAG}
          imagePullPolicy: Always
          command:
            - uvicorn
            - core.asgi:application
            - --host
            - 0.0.0.0
            - --port
            - "8000"
          env:
            - name: APP_ENV
              value: production
            - name: DEBUG
              value: "false"
            - name: APP_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app
                  key: SECRET_KEY
            - name: DATABASE_ENGINE
              value: django.db.backends.sqlite3
            - name: PGSQL_DATABASE_FACILITATOR
              value: /data/facilitator2.sqlite3
            - name: X402_BASE_RPC_URL
              value: https://sepolia.base.org
            - name: X402_BASE_NETWORK
              value: eip155:84532
            - name: X402_BASE_CHAIN_ID
              value: "84532"
            - name: X402_BASE_SIGNER_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: facilitator2-runtime
                  key: BASE_SIGNER_PRIVATE_KEY
            - name: X402_BASE_SIGNER_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: facilitator2-runtime
                  key: BASE_SIGNER_ADDRESS
            - name: X402_BASE_PAY_TO
              valueFrom:
                secretKeyRef:
                  name: facilitator2-runtime
                  key: BASE_PAY_TO
            - name: X402_BASE_ASSET
              value: "0x036CbD53842c5426634e7929541eC2318f3dCF7e"
            - name: X402_SETTLE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: facilitator2-runtime
                  key: SETTLE_TOKEN
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /supported
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: facilitator2-data
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: facilitator2-backend
  namespace: acedatacloud
  labels:
    app: facilitator2-backend
spec:
  selector:
    app: facilitator2-backend
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: facilitator2-backend
  namespace: acedatacloud
  labels:
    app: facilitator2-backend
  annotations:
    nginx.ingress.kubernetes.io/limit-connections: "32"
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/proxy-body-size: 64k
    nginx.ingress.kubernetes.io/proxy-read-timeout: "180"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "180"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx-router
  tls:
    - hosts:
        - facilitator2.acedata.cloud
      secretName: tls-wildcard-acedata-cloud
  rules:
    - host: facilitator2.acedata.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: facilitator2-backend
                port:
                  number: 8000