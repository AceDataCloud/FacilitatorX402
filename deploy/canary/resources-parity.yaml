apiVersion: apps/v1
kind: Deployment
metadata:
  name: facilitator2-backend
  namespace: acedatacloud
  labels:
    app: facilitator2-backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: facilitator2-backend
  template:
    metadata:
      labels:
        app: facilitator2-backend
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: docker-registry
      containers:
        - name: facilitator2-backend
          image: ghcr.io/acedatacloud/facilitator-backend:${TAG}
          imagePullPolicy: Always
          command: ["uvicorn", "core.asgi:application", "--host", "0.0.0.0", "--port", "8000"]
          envFrom:
            - configMapRef:
                name: facilitator2-config
            - secretRef:
                name: facilitator2-parity-runtime
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
              httpHeaders:
                - name: Host
                  value: facilitator2.acedata.cloud
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
              httpHeaders:
                - name: Host
                  value: facilitator2.acedata.cloud
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: facilitator2-backend
  namespace: acedatacloud
  labels:
    app: facilitator2-backend
spec:
  selector:
    app: facilitator2-backend
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: facilitator2-backend
  namespace: acedatacloud
  labels:
    app: facilitator2-backend
  annotations:
    nginx.ingress.kubernetes.io/limit-connections: "64"
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/proxy-body-size: 256k
    nginx.ingress.kubernetes.io/proxy-read-timeout: "180"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "180"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx-router
  tls:
    - hosts: [facilitator2.acedata.cloud]
      secretName: tls-wildcard-acedata-cloud
  rules:
    - host: facilitator2.acedata.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: facilitator2-backend
                port:
                  name: http
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: facilitator2-reconcile
  namespace: acedatacloud
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 50
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: facilitator2-reconcile
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          imagePullSecrets:
            - name: docker-registry
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: reconcile
              image: ghcr.io/acedatacloud/facilitator-backend:${TAG}
              imagePullPolicy: Always
              command: ["python", "manage.py", "reconcile_x402", "--limit", "100"]
              envFrom:
                - configMapRef:
                    name: facilitator2-config
                - secretRef:
                    name: facilitator2-parity-runtime
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                readOnlyRootFilesystem: true
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 32Mi
