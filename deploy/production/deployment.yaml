apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: facilitator-backend
  name: facilitator-backend
  namespace: acedatacloud
spec:
  progressDeadlineSeconds: 600
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: facilitator-backend
  strategy:
    # Settlement state semantics changed in this release. Never overlap pods
    # running incompatible idempotency logic during deployment.
    type: Recreate
  template:
    metadata:
      labels:
        app: facilitator-backend
    spec:
      containers:
        - env:
            - name: APP_ENV
              value: production
            - name: ALLOWED_HOSTS
              value: facilitator.acedata.cloud,localhost,127.0.0.1
            - name: APP_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  key: SECRET_KEY
                  name: app
                  optional: false
            - name: PGSQL_DATABASE_FACILITATOR
              value: acedatacloud_facilitator
            - name: PGSQL_HOST
              valueFrom:
                secretKeyRef:
                  key: PGSQL_HOST
                  name: pgsql
                  optional: false
            - name: PGSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: PGSQL_PASSWORD
                  name: pgsql
                  optional: false
            - name: PGSQL_PORT
              valueFrom:
                secretKeyRef:
                  key: PGSQL_PORT
                  name: pgsql
                  optional: false
            - name: PGSQL_USER
              valueFrom:
                secretKeyRef:
                  key: PGSQL_USER
                  name: pgsql
                  optional: false
            - name: X402_FACILITATOR_PUBLIC_URL
              value: https://facilitator.acedata.cloud
            - name: X402_BASE_NETWORK
              value: eip155:8453
            - name: X402_BASE_CHAIN_ID
              value: "8453"
            - name: X402_BASE_RPC_URL
              valueFrom:
                secretKeyRef:
                  key: BASE_RPC_URL
                  name: x402
                  optional: false
            - name: X402_BASE_SIGNER_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  key: BASE_SIGNER_PRIVATE_KEY
                  name: x402
                  optional: false
            - name: X402_BASE_SIGNER_ADDRESS
              valueFrom:
                secretKeyRef:
                  key: BASE_SIGNER_ADDRESS
                  name: x402
                  optional: false
            - name: X402_BASE_ASSET
              valueFrom:
                secretKeyRef:
                  key: BASE_ASSET
                  name: x402
                  optional: false
            - name: X402_BASE_PAY_TO
              valueFrom:
                secretKeyRef:
                  key: BASE_PAY_TO
                  name: x402
                  optional: false
            - name: X402_BASE_EXACT_ENABLED
              value: "true"
            - name: X402_BASE_UPTO_ENABLED
              value: "true"
            - name: X402_GAS_LIMIT
              value: "500000"
            - name: X402_TX_TIMEOUT_SECONDS
              value: "120"
            - name: X402_SETTLE_TOKEN
              valueFrom:
                secretKeyRef:
                  key: SETTLE_TOKEN
                  name: x402
                  optional: false
            - name: X402_SOLANA_RPC_URL
              valueFrom:
                secretKeyRef:
                  key: SOLANA_RPC_URL
                  name: x402
                  optional: false
            - name: X402_SOLANA_SIGNER_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  key: SOLANA_SIGNER_PRIVATE_KEY
                  name: x402
                  optional: false
            - name: X402_SOLANA_SIGNER_ADDRESS
              valueFrom:
                secretKeyRef:
                  key: SOLANA_SIGNER_ADDRESS
                  name: x402
                  optional: false
            - name: X402_SOLANA_ASSET
              valueFrom:
                secretKeyRef:
                  key: SOLANA_ASSET
                  name: x402
                  optional: false
            - name: X402_SOLANA_PAY_TO
              valueFrom:
                secretKeyRef:
                  key: SOLANA_PAY_TO
                  name: x402
                  optional: false
            - name: X402_SOLANA_MAINNET_ENABLED
              value: "true"
            - name: X402_SOLANA_DEVNET_ENABLED
              value: "false"
            - name: X402_SKALE_RPC_URL
              valueFrom:
                secretKeyRef:
                  key: SKALE_RPC_URL
                  name: x402
                  optional: false
            - name: X402_SKALE_SIGNER_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  key: SKALE_SIGNER_PRIVATE_KEY
                  name: x402
                  optional: false
            - name: X402_SKALE_SIGNER_ADDRESS
              valueFrom:
                secretKeyRef:
                  key: SKALE_SIGNER_ADDRESS
                  name: x402
                  optional: false
            - name: X402_SKALE_ASSET
              valueFrom:
                secretKeyRef:
                  key: SKALE_USDC_ASSET
                  name: x402
                  optional: false
            - name: X402_SKALE_PAY_TO
              valueFrom:
                secretKeyRef:
                  key: SKALE_PAY_TO
                  name: x402
                  optional: false
            - name: X402_SKALE_CHAIN_ID
              value: "1187947933"
            - name: X402_SKALE_GAS_LIMIT
              value: "50000000"
            - name: X402_SKALE_EXACT_ENABLED
              value: "true"
            - name: X402_SETTLEMENT_LEASE_SECONDS
              value: "300"
            - name: X402_PREPARED_MAX_AGE_SECONDS
              value: "1800"
            - name: X402_DISCOVERY_URL
              value: https://platform.acedata.cloud/api/v1/x402/discovery/
            - name: X402_DISCOVERY_ALLOWED_HOSTS
              value: platform.acedata.cloud
            - name: X402_DISCOVERY_RESOURCE_HOSTS
              value: x402.acedata.cloud
            # Tencent Cloud SSM — optional, fills in env vars not already set.
            - name: TENCENT_CLOUD_SECRET_ID
              valueFrom:
                secretKeyRef:
                  key: TENCENT_CLOUD_SECRET_ID
                  name: tencent-cloud
                  optional: true
            - name: TENCENT_CLOUD_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  key: TENCENT_CLOUD_SECRET_KEY
                  name: tencent-cloud
                  optional: true
            - name: TENCENT_SSM_SECRET_NAME
              value: ""
            - name: TENCENT_SSM_REGION
              value: ap-hongkong
          image: ghcr.io/acedatacloud/facilitator-backend:${TAG}
          imagePullPolicy: IfNotPresent
          name: facilitator-backend
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
              httpHeaders:
                - name: Host
                  value: facilitator.acedata.cloud
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
              httpHeaders:
                - name: Host
                  value: facilitator.acedata.cloud
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          ports:
            - containerPort: 8000
              protocol: TCP
          resources:
            limits:
              cpu: 200m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
          securityContext:
            privileged: false
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      imagePullSecrets:
        - name: docker-registry
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
