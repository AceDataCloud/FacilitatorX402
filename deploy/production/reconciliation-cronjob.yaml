apiVersion: batch/v1
kind: CronJob
metadata:
  name: facilitator-reconcile
  namespace: acedatacloud
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 50
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: facilitator-reconcile
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          imagePullSecrets:
            - name: docker-registry
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: reconcile
              image: ghcr.io/acedatacloud/facilitator-backend:${TAG}
              imagePullPolicy: IfNotPresent
              command: ["python", "manage.py", "reconcile_x402", "--limit", "100"]
              envFrom:
                - secretRef:
                    name: pgsql
              env:
                - name: APP_ENV
                  value: production
                - name: APP_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      key: SECRET_KEY
                      name: app
                      optional: false
                - name: PGSQL_DATABASE_FACILITATOR
                  value: acedatacloud_facilitator
                - name: X402_BASE_NETWORK
                  value: eip155:8453
                - name: X402_BASE_CHAIN_ID
                  value: "8453"
                - name: X402_BASE_RPC_URL
                  valueFrom:
                    secretKeyRef:
                      key: BASE_RPC_URL
                      name: x402
                      optional: false
                - name: X402_BASE_SIGNER_PRIVATE_KEY
                  valueFrom:
                    secretKeyRef:
                      key: BASE_SIGNER_PRIVATE_KEY
                      name: x402
                      optional: false
                - name: X402_BASE_SIGNER_ADDRESS
                  valueFrom:
                    secretKeyRef:
                      key: BASE_SIGNER_ADDRESS
                      name: x402
                      optional: false
                - name: X402_BASE_ASSET
                  valueFrom:
                    secretKeyRef:
                      key: BASE_ASSET
                      name: x402
                      optional: false
                - name: X402_BASE_PAY_TO
                  valueFrom:
                    secretKeyRef:
                      key: BASE_PAY_TO
                      name: x402
                      optional: false
                - name: X402_BASE_EXACT_ENABLED
                  value: "true"
                - name: X402_BASE_UPTO_ENABLED
                  value: "true"
                - name: X402_GAS_LIMIT
                  value: "500000"
                - name: X402_TX_TIMEOUT_SECONDS
                  value: "120"
                - name: X402_SETTLE_TOKEN
                  valueFrom:
                    secretKeyRef:
                      key: SETTLE_TOKEN
                      name: x402
                      optional: false
                - name: X402_SOLANA_RPC_URL
                  valueFrom:
                    secretKeyRef:
                      key: SOLANA_RPC_URL
                      name: x402
                      optional: false
                - name: X402_SOLANA_SIGNER_PRIVATE_KEY
                  valueFrom:
                    secretKeyRef:
                      key: SOLANA_SIGNER_PRIVATE_KEY
                      name: x402
                      optional: false
                - name: X402_SOLANA_SIGNER_ADDRESS
                  valueFrom:
                    secretKeyRef:
                      key: SOLANA_SIGNER_ADDRESS
                      name: x402
                      optional: false
                - name: X402_SOLANA_ASSET
                  valueFrom:
                    secretKeyRef:
                      key: SOLANA_ASSET
                      name: x402
                      optional: false
                - name: X402_SOLANA_PAY_TO
                  valueFrom:
                    secretKeyRef:
                      key: SOLANA_PAY_TO
                      name: x402
                      optional: false
                - name: X402_SOLANA_MAINNET_ENABLED
                  value: "true"
                - name: X402_SOLANA_DEVNET_ENABLED
                  value: "false"
                - name: X402_SKALE_RPC_URL
                  valueFrom:
                    secretKeyRef:
                      key: SKALE_RPC_URL
                      name: x402
                      optional: false
                - name: X402_SKALE_SIGNER_PRIVATE_KEY
                  valueFrom:
                    secretKeyRef:
                      key: SKALE_SIGNER_PRIVATE_KEY
                      name: x402
                      optional: false
                - name: X402_SKALE_SIGNER_ADDRESS
                  valueFrom:
                    secretKeyRef:
                      key: SKALE_SIGNER_ADDRESS
                      name: x402
                      optional: false
                - name: X402_SKALE_ASSET
                  valueFrom:
                    secretKeyRef:
                      key: SKALE_USDC_ASSET
                      name: x402
                      optional: false
                - name: X402_SKALE_PAY_TO
                  valueFrom:
                    secretKeyRef:
                      key: SKALE_PAY_TO
                      name: x402
                      optional: false
                - name: X402_SKALE_CHAIN_ID
                  value: "1187947933"
                - name: X402_SKALE_GAS_LIMIT
                  value: "50000000"
                - name: X402_SKALE_EXACT_ENABLED
                  value: "true"
                - name: X402_SETTLEMENT_LEASE_SECONDS
                  value: "300"
                - name: X402_PREPARED_MAX_AGE_SECONDS
                  value: "1800"
              resources:
                limits:
                  cpu: 200m
                  memory: 256Mi
                requests:
                  cpu: 50m
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                readOnlyRootFilesystem: true
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 32Mi
