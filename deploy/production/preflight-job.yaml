apiVersion: batch/v1
kind: Job
metadata:
  name: ${PREFLIGHT_JOB}
  namespace: acedatacloud
spec:
  activeDeadlineSeconds: 300
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: facilitator-preflight
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: docker-registry
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: preflight
          image: ghcr.io/acedatacloud/facilitator-backend:${TAG}
          imagePullPolicy: IfNotPresent
          command:
            - python
            - manage.py
            - check_official_v2_cutover
            - --fail-expired
          envFrom:
            - secretRef:
                name: pgsql
          env:
            - name: APP_ENV
              value: production
            - name: APP_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  key: SECRET_KEY
                  name: app
                  optional: false
            - name: PGSQL_DATABASE_FACILITATOR
              value: acedatacloud_facilitator
            - name: X402_BASE_NETWORK
              value: eip155:8453
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 32Mi
