apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: facilitator-backend
  namespace: acedatacloud
  labels:
    app: facilitator-backend
  annotations:
    kubernetes.io/ingress.class: nginx-router
    kubernetes.io/ingress.rule-mix: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - facilitator.acedata.cloud
      secretName: tls-wildcard-acedata-cloud
  rules:
    - host: facilitator.acedata.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: facilitator-backend
                port:
                  number: 8000
